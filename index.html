          name: 'description',

      formatUpdated: '{MM}/{DD}/{YYYY}',
      search: {

        placeholder: 'Search documentation',
        noData: 'No results found',
        depth: 6,
        hideOtherSidebarContent: true
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied!'
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            const editUrl = 'https://github.com/sockeon/docs/edit/main/' + vm.route.file;

              '<div style="text-align: right; color: #999;">' +

  <script>
    if (typeof navigator.serviceWorker !== 'undefined') {
      navigator.serviceWorker.register('sw.js')
    }
  </script>
  
  <script>
    (function() {
      const customPageTitles = window.$docsify.customPageTitle || {};
      const customMetaTags = window.$docsify.customMetaTags || [];
      
      const updateMetadata = function(event) {
        const currentPath = window.location.hash.split('?')[0].replace('#', '');
        
        for (const path in customPageTitles) {
          if (currentPath === path || currentPath === path.replace(/^\//,'')) {
            document.title = customPageTitles[path];
            break;
          }
        }
        
        customMetaTags.forEach(function(metaTag) {
          const metaPath = metaTag.path.replace(/^\//,'');
          if (currentPath === metaTag.path || currentPath === metaPath) {
            let meta = document.querySelector('meta[name="' + metaTag.name + '"]');
            if (meta) {
              meta.setAttribute('content', metaTag.content);
            } else {
              meta = document.createElement('meta');
              meta.name = metaTag.name;
              meta.content = metaTag.content;
              document.head.appendChild(meta);
            }
          }
        });
      };
      
      window.addEventListener('hashchange', updateMetadata);
      window.$docsify.plugins = [].concat(function(hook) {
        hook.doneEach(updateMetadata);
      }, window.$docsify.plugins || []);
    })();
  </script>
