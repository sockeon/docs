<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Sockeon - A framework-agnostic PHP WebSocket and HTTP server library" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>Sockeon Documentation</title>
  <meta name="keywords" content="PHP, WebSocket, HTTP, Server, Real-time, Communication, Sockeon">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css" />
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <!-- Custom theme stylesheet -->
  <style>
    :root {
      --theme-color: #42b983;
      --theme-color-dark: #35495e;
    }
    .markdown-section a {
      color: var(--theme-color);
      font-weight: 600;
    }
    .app-name-link img {
      max-width: 80%;
    }
    .sidebar-nav > ul > li > a {
      font-weight: 700;
    }
    .markdown-section code {
      color: var(--theme-color-dark);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Sockeon',
      nameLink: '/',
      repo: 'https://github.com/sockeon/sockeon',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      coverpage: true,
      routerMode: 'hash',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_coverpage.md': '/_coverpage.md'
      },
      formatUpdated: '{MM}/{DD}/{YYYY}',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation',
        noData: 'No results found',
        depth: 6,
        hideOtherSidebarContent: true
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied!'
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            const editUrl = 'https://github.com/sockeon/docs/edit/main/' + vm.route.file;
            return content + '\n\n----\n' +
              '<div style="text-align: right; color: #999;">' +
              '<small>Last modified: {docsify-updated} | ' +
              '<a href="' + editUrl + '" target="_blank">Edit this page</a></small></div>';
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs/dist/docsify-tabs.min.js"></script>
  
  <!-- Syntax highlighting for code blocks -->
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-php.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs/components/prism-http.min.js"></script>

  <!-- Google Analytics or similar tracking (replace UA-XXXXX-Y with your tracking ID) -->
  <script>
    if (typeof navigator.serviceWorker !== 'undefined') {
      navigator.serviceWorker.register('sw.js')
    }
  </script>
</body>
</html>
